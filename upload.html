<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Unsere Hochzeit — Fotos & Videos teilen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ivory: #FBF6EF;
    --ivory-deep: #F3EADC;
    --ink: #33302A;
    --gold: #B08D57;
    --gold-soft: #D9C29B;
    --peach: #E7BFA6;
    --sage: #9AA588;
  }

  * { box-sizing: border-box; }

  body {
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    background: var(--ivory);
    background-image:
      radial-gradient(ellipse at top left, var(--ivory-deep) 0%, transparent 55%),
      radial-gradient(ellipse at bottom right, var(--ivory-deep) 0%, transparent 55%);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 56px 20px;
    color: var(--ink);
    margin: 0;
    min-height: 100vh;
  }

  .card {
    background: #ffffff;
    border-radius: 4px;
    padding: 48px 36px 36px;
    max-width: 460px;
    width: 100%;
    box-shadow: 0 1px 3px rgba(51,48,42,0.06), 0 20px 48px rgba(51,48,42,0.08);
    text-align: center;
    box-sizing: border-box;
    position: relative;
    animation: riseIn 0.7s ease-out both;
  }

  @keyframes riseIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .sprig {
    width: 92px;
    height: auto;
    margin: 0 auto 18px;
    display: block;
    color: var(--sage);
    animation: sway 6s ease-in-out infinite;
    transform-origin: bottom center;
  }
  @keyframes sway {
    0%, 100% { transform: rotate(-2deg); }
    50% { transform: rotate(2deg); }
  }
  @media (prefers-reduced-motion: reduce) {
    .sprig, .card { animation: none; }
  }

  .eyebrow {
    font-family: 'Jost', sans-serif;
    font-size: 0.68em;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: 2.15em;
    line-height: 1.15;
    margin: 0 0 6px;
    color: var(--ink);
  }

  .divider {
    width: 40px;
    height: 1px;
    background: var(--gold-soft);
    margin: 16px auto 18px;
  }

  p.sub {
    color: #746E62;
    margin-bottom: 28px;
    font-size: 0.95em;
    line-height: 1.5;
    font-weight: 300;
  }

  #dropzone {
    border: 1px solid var(--gold-soft);
    border-radius: 3px;
    padding: 34px 18px;
    cursor: pointer;
    transition: background 0.25s, border-color 0.25s;
    font-size: 0.9em;
    color: #8A8375;
    letter-spacing: 0.01em;
  }
  #dropzone:hover, #dropzone.dragover {
    background: var(--ivory);
    border-color: var(--gold);
  }

  input[type="file"] { display: none; }

  #fileList { text-align: left; margin-top: 18px; font-size: 0.88em; }
  .fileItem { padding: 9px 0; border-bottom: 1px solid #F0E9DC; }
  .fileItem .name { display: flex; justify-content: space-between; gap: 12px; }
  .fileItem .name span:first-child {
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .progressBar { height: 3px; background: #F0E9DC; border-radius: 2px; margin-top: 7px; overflow: hidden; }
  .progressFill { height: 100%; background: var(--gold); width: 0%; transition: width 0.2s; }
  .status { font-size: 0.85em; flex-shrink: 0; }
  .status.ok { color: var(--sage); }
  .status.err { color: #B4534A; }
  .status.pending { color: #B7AF9E; }

  button {
    margin-top: 26px;
    background: var(--ink);
    color: var(--ivory);
    border: none;
    padding: 13px 36px;
    border-radius: 2px;
    font-family: 'Jost', sans-serif;
    font-size: 0.82em;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
  }
  button:hover:not(:disabled) { background: var(--gold); }
  button:disabled { opacity: 0.4; cursor: default; }

  #doneMsg {
    margin-top: 18px;
    color: var(--sage);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.15em;
    font-style: italic;
    display: none;
  }
</style>
</head>
<body>
  <div class="card">
    <svg class="sprig" viewBox="0 0 100 120" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M50 118 C 48 90, 52 60, 50 20" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <ellipse cx="38" cy="34" rx="9" ry="13" transform="rotate(-35 38 34)" fill="currentColor" opacity="0.55"/>
      <ellipse cx="63" cy="46" rx="9" ry="13" transform="rotate(35 63 46)" fill="currentColor" opacity="0.55"/>
      <ellipse cx="35" cy="60" rx="9.5" ry="14" transform="rotate(-32 35 60)" fill="currentColor" opacity="0.7"/>
      <ellipse cx="66" cy="72" rx="9.5" ry="14" transform="rotate(32 66 72)" fill="currentColor" opacity="0.7"/>
      <ellipse cx="40" cy="90" rx="10" ry="15" transform="rotate(-30 40 90)" fill="currentColor" opacity="0.85"/>
      <ellipse cx="62" cy="100" rx="10" ry="15" transform="rotate(30 62 100)" fill="currentColor" opacity="0.85"/>
      <circle cx="50" cy="18" r="3" fill="currentColor"/>
    </svg>
    <div class="eyebrow">Unsere Hochzeit</div>
    <h1>Teilt eure<br>schönsten Momente</h1>
    <div class="divider"></div>
    <p class="sub">Ladet eure Fotos und Videos vom Tag ganz einfach hoch — kein Login nötig, und nur wir sehen die Sammlung.</p>
    <div id="dropzone" onclick="document.getElementById('fileInput').click()">
      Zum Auswählen tippen oder Dateien hierher ziehen
    </div>
    <input type="file" id="fileInput" multiple accept="image/*,video/*">
    <div id="fileList"></div>
    <button id="uploadBtn" onclick="startUpload()" disabled>Hochladen</button>
    <div id="doneMsg">Danke euch von Herzen ♡</div>
  </div>

<script>
  // ==== KONFIGURATION ====
  // Hier die /exec URL deines Apps-Script-Deployments eintragen:
  var SCRIPT_URL = 'HIER_DEINE_EXEC_URL_EINTRAGEN';

  var CHUNK_SIZE = 4 * 1024 * 1024; // 4 MB pro Chunk

  var selectedFiles = [];
  var dropzone = document.getElementById('dropzone');
  var fileInput = document.getElementById('fileInput');
  var fileListEl = document.getElementById('fileList');
  var uploadBtn = document.getElementById('uploadBtn');

  fileInput.addEventListener('change', function(e) { addFiles(e.target.files); });

  dropzone.addEventListener('dragover', function(e) {
    e.preventDefault();
    dropzone.classList.add('dragover');
  });
  dropzone.addEventListener('dragleave', function() {
    dropzone.classList.remove('dragover');
  });
  dropzone.addEventListener('drop', function(e) {
    e.preventDefault();
    dropzone.classList.remove('dragover');
    addFiles(e.dataTransfer.files);
  });

  function addFiles(fileListObj) {
    for (var i = 0; i < fileListObj.length; i++) {
      selectedFiles.push(fileListObj[i]);
    }
    renderList();
  }

  function renderList() {
    fileListEl.innerHTML = '';
    selectedFiles.forEach(function(f, idx) {
      var div = document.createElement('div');
      div.className = 'fileItem';
      div.innerHTML =
        '<div class="name"><span>' + f.name + '</span>' +
        '<span class="status pending" id="status-' + idx + '">wartet</span></div>' +
        '<div class="progressBar"><div class="progressFill" id="progress-' + idx + '"></div></div>';
      fileListEl.appendChild(div);
    });
    uploadBtn.disabled = selectedFiles.length === 0;
  }

  function startUpload() {
    uploadBtn.disabled = true;
    uploadNext(0);
  }

  function uploadNext(idx) {
    if (idx >= selectedFiles.length) {
      document.getElementById('doneMsg').style.display = 'block';
      return;
    }
    uploadFile(selectedFiles[idx], idx).then(function() {
      uploadNext(idx + 1);
    }).catch(function() {
      uploadNext(idx + 1);
    });
  }

  function uploadFile(file, idx) {
    var statusEl = document.getElementById('status-' + idx);
    var progressEl = document.getElementById('progress-' + idx);
    var uploadId = 'u' + Date.now() + '_' + Math.random().toString(36).slice(2, 10);
    var totalChunks = Math.max(1, Math.ceil(file.size / CHUNK_SIZE));

    statusEl.textContent = 'lädt...';
    statusEl.className = 'status pending';

    var chunkIndex = 0;

    function sendChunk() {
      var start = chunkIndex * CHUNK_SIZE;
      var end = Math.min(file.size, start + CHUNK_SIZE);
      var slice = file.slice(start, end);

      return readAsBase64(slice).then(function(base64) {
        var body = JSON.stringify({
          uploadId: uploadId,
          chunkIndex: chunkIndex,
          totalChunks: totalChunks,
          fileName: file.name,
          mimeType: file.type || 'application/octet-stream',
          data: base64
        });

        return fetch(SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // vermeidet CORS-Preflight
          body: body
        }).then(function(res) { return res.json(); }).then(function(json) {
          if (!json.success) throw new Error(json.error || 'Unbekannter Fehler');

          progressEl.style.width = Math.round(((chunkIndex + 1) / totalChunks) * 100) + '%';

          chunkIndex++;
          if (chunkIndex < totalChunks) {
            return sendChunk();
          } else {
            statusEl.textContent = 'fertig';
            statusEl.className = 'status ok';
          }
        });
      });
    }

    return sendChunk().catch(function(err) {
      statusEl.textContent = 'Fehler';
      statusEl.className = 'status err';
      console.error(err);
    });
  }

  function readAsBase64(blob) {
    return new Promise(function(resolve, reject) {
      var reader = new FileReader();
      reader.onload = function() { resolve(reader.result.split(',')[1]); };
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    });
  }
</script>
</body>
</html>
